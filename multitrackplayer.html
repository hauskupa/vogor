<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Album Mixer Test</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/vogor/dist/albumMixer.css">

<body>
  <div data-album-mixer>
    <header class="tm4-header">
      <h1 class="tm4-title">4-Track Album Mixer</h1>
      <div class="tm4-header-meta">
        <div class="tm4-counter-panel tm4-counter-panel--header">
          <span class="tm4-counter-label">Counter</span>
          <output class="tm4-counter-readout" data-mixer-counter>000</output>
        </div>
        <div class="tm4-badge tm4-brand" aria-label="TASCAM">TASCAM</div>
      </div>
    </header>

    <div class="tm4-layout">
      <div class="tm4-left">
        <section class="tm4-track-bank">
          <div data-mixer-track-controls></div>
          <section class="tm4-master-strip">
            <div class="tm4-strip-title">Master</div>
            <label class="tm4-master-wrap">
              <span>Level</span>
              <input class="tm4-master-fader" type="range" min="0" max="1" step="0.01" value="0.7" data-mixer-master />
              <output class="tm4-readout" data-mixer-master-value>7.0</output>
            </label>
            <div class="tm4-readout">Bus</div>
          </section>
        </section>
      </div>

      <div class="tm4-right">
        <section class="tm4-display">
          <div class="tm4-screen">
            <div class="cassette tm4-cassette" data-cassette aria-hidden="true">

                  <line x1="606.85" y1="251.81" x2="576" y2="234" stroke="#f2f2f2" stroke-width="2" />

                  <path d="M780.41,0H29.59A20.59,20.59,0,0,0,9,20.59V483.41A20.59,20.59,0,0,0,29.59,504H780.41A20.59,20.59,0,0,0,801,483.41V20.59A20.59,20.59,0,0,0,780.41,0ZM297,189H513v90H297ZM220.5,486A13.5,13.5,0,1,1,234,472.5,13.49,13.49,0,0,1,220.5,486ZM234,279a45,45,0,1,1,45-45A45,45,0,0,1,234,279Zm58.5,198A13.5,13.5,0,1,1,306,463.5,13.49,13.49,0,0,1,292.5,477Zm225,0A13.5,13.5,0,1,1,531,463.5,13.49,13.49,0,0,1,517.5,477Zm72,9A13.5,13.5,0,1,1,603,472.5,13.49,13.49,0,0,1,589.5,486ZM576,279a45,45,0,1,1,45-45A45,45,0,0,1,576,279Z" fill="#262626" />

                  <rect x="297" y="189" width="216" height="90" fill="#262626" opacity="0.67" />

                  <rect x="45" y="36" width="720" height="27" fill="#ec1d25" />
                  <rect x="45" y="63" width="720" height="81" fill="#f2f2f2" />
                  <rect x="45" y="315" width="720" height="54" fill="#1a1a1a" />
                  <g stroke="#f2f2f2" stroke-width="2">
                    <line x1="45" y1="171" x2="162" y2="171" />
                    <line x1="45" y1="180" x2="162" y2="180" />
                    <line x1="45" y1="189" x2="162" y2="189" />

                  <rect x="531" y="297" width="104" height="72" fill="#ec1d25" />
                </g>
              </svg>
              <div class="tm4-cassette-overlay">
                <div class="tm4-cassette-side" data-mixer-current-side>A</div>
                <div class="tm4-cassette-title" data-mixer-cassette-title>Loading...</div>
                <div class="tm4-cassette-counter" data-mixer-cassette-time>0:00 / 0:00</div>
              </div>
            </div>
            <output data-mixer-current-song hidden>Loading...</output>
            <output data-mixer-time hidden>0:00 / 0:00</output>
          </div>
        </section>

        <section class="tm4-transport">
          <div class="tm4-transport-row">
            <button type="button" class="tm4-nav" data-mixer-prev>Rew</button>
            <button type="button" data-mixer-play>Play</button>
            <button type="button" data-mixer-pause>Pause</button>
            <button type="button" data-mixer-stop>Stop</button>
            <button type="button" class="tm4-nav" data-mixer-next>Ff</button>
          </div>

          <div class="tm4-transport-row">
            <input type="range" min="0" max="0" step="0.01" value="0" data-mixer-seek hidden />
          </div>

          <div class="tm4-transport-row tm4-pitch">
            <label class="tm4-meter">
              
              <div class="tm4-pitch-row">
                <div data-mixer-pitch-knob></div>
                <output data-mixer-pitch-value>100%</output>
              </div>
            </label>
          </div>
        </section>
      </div>

      <div class="tm4-hidden-lists">
        <div data-mixer-side-a></div>
        <div data-mixer-side-b></div>
      </div>
    </div>
  </div>

  <script src="/vogor/dist/main.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Album Mixer Test</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/vogor/dist/albumMixer.css">
</head>
<body>
  <div data-album-mixer>
    <header class="tm4-header">
      <h1 class="tm4-title">4-Track Album Mixer</h1>
      <div class="tm4-badge">424</div>
    </header>

    <div class="tm4-layout">
      <div class="tm4-left">
        <section class="tm4-track-bank">
          <div data-mixer-track-controls></div>
          <section class="tm4-master-strip">
            <div class="tm4-strip-title">Master</div>
            <label class="tm4-master-wrap">
              <span>Level</span>
              <input class="tm4-master-fader" type="range" min="0" max="1" step="0.01" value="0.7" data-mixer-master />
              <output class="tm4-readout" data-mixer-master-value>7.0</output>
            </label>
            <div class="tm4-readout">Bus</div>
          </section>
        </section>
      </div>

      <div class="tm4-right">
        <section class="tm4-display">
          <div class="tm4-screen">
            <div class="tm4-cassette" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 513.5">
                <rect class="tm4-cassette-shell" x="10" y="10" width="790" height="493.5" rx="20.59" />
                <rect class="tm4-cassette-label" x="45" y="36" width="720" height="333" />
                <rect class="tm4-cassette-stripe" x="45" y="36" width="720" height="27" />
                <rect class="tm4-cassette-bottom" x="45" y="315" width="720" height="54" />
                <rect class="tm4-cassette-window" x="162" y="171" width="486" height="126" />

                <g class="tm4-cassette-reel is-left">
                  <g class="tm4-cassette-mass is-left">
                    <circle cx="234" cy="234" r="124" fill="#111110" />
                    <circle cx="234" cy="234" r="104" fill="none" stroke="#2f322c" stroke-width="6" />
                    <circle cx="234" cy="234" r="84" fill="none" stroke="#2f322c" stroke-width="6" />
                  </g>
                  <circle cx="234" cy="234" r="88" fill="#f2f2f2" />
                  <circle cx="234" cy="234" r="56" fill="#bfbfbf" />
                  <circle cx="234" cy="234" r="24" fill="#1a1a1a" />
                  <polygon points="234 186 204 238 264 238 234 186" fill="#1a1a1a" />
                </g>

                <g class="tm4-cassette-reel is-right">
                  <g class="tm4-cassette-mass is-right">
                    <circle cx="576" cy="234" r="124" fill="#111110" />
                    <circle cx="576" cy="234" r="104" fill="none" stroke="#2f322c" stroke-width="6" />
                    <circle cx="576" cy="234" r="84" fill="none" stroke="#2f322c" stroke-width="6" />
                  </g>
                  <circle cx="576" cy="234" r="88" fill="#f2f2f2" />
                  <circle cx="576" cy="234" r="56" fill="#bfbfbf" />
                  <circle cx="576" cy="234" r="24" fill="#1a1a1a" />
                  <polygon points="576 186 546 238 606 238 576 186" fill="#1a1a1a" />
                </g>

                <circle class="tm4-cassette-screw" cx="220.5" cy="472.5" r="13.5" />
                <circle class="tm4-cassette-screw" cx="292.5" cy="463.5" r="13.5" />
                <circle class="tm4-cassette-screw" cx="517.5" cy="463.5" r="13.5" />
                <circle class="tm4-cassette-screw" cx="589.5" cy="472.5" r="13.5" />
              </svg>
              <div class="tm4-cassette-overlay">
                <div class="tm4-cassette-side" data-mixer-current-side>A</div>
                <div class="tm4-cassette-title" data-mixer-cassette-title>Loading...</div>
                <div class="tm4-cassette-counter" data-mixer-cassette-time>0:00 / 0:00</div>
              </div>
            </div>
            <output data-mixer-current-song hidden>Loading...</output>
            <output data-mixer-time hidden>0:00 / 0:00</output>
          </div>
        </section>

        <section class="tm4-transport">
          <div class="tm4-transport-row">
            <button type="button" class="tm4-nav" data-mixer-prev>Rew</button>
            <button type="button" data-mixer-play>Play</button>
            <button type="button" data-mixer-pause>Pause</button>
            <button type="button" data-mixer-stop>Stop</button>
            <button type="button" class="tm4-nav" data-mixer-next>Ff</button>
          </div>

          <div class="tm4-transport-row">
            <label class="tm4-meter">
              <span>Seek</span>
              <input type="range" min="0" max="0" step="0.01" value="0" data-mixer-seek />
            </label>
          </div>

          <div class="tm4-transport-row tm4-pitch">
            <label class="tm4-meter">
              
              <div class="tm4-pitch-row">
                <div data-mixer-pitch-knob></div>
                <output data-mixer-pitch-value>100%</output>
              </div>
            </label>
          </div>
        </section>
      </div>

      <div class="tm4-hidden-lists">
        <div data-mixer-side-a></div>
        <div data-mixer-side-b></div>
      </div>
    </div>
  </div>

  <script src="/vogor/dist/main.js" defer></script>
</body>
</html>
